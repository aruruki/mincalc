name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install dioxus-cli
        run: cargo install dioxus-cli@0.6.3 --locked

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tailwind CSS
        run: npm install -D tailwindcss

      - name: Build Tailwind CSS
        run: npx @tailwindcss/cli -i ./input.css -o ./assets/tailwind.css

      - name: Build web app
        run: dx build --platform web --release

      - name: Debug build output
        run: |
          echo "Checking dist/..."
          ls -la dist/ 2>/dev/null || echo "dist/ not found"
          echo "Checking target/dx/mincalc/release/web/..."
          ls -la target/dx/mincalc/release/web/ 2>/dev/null || echo "target/dx build output not found"
          echo "Searching for all HTML files..."
          find . -name "*.html" -type f 2>/dev/null | head -10

      - name: Prepare dist for upload
        run: |
          # Ensure dist/ exists and contains index.html
          if [ ! -f "dist/index.html" ]; then
            echo "dist/index.html not found, checking Dioxus output location..."
            DX_OUTPUT="target/dx/mincalc/release/web"
            if [ -f "$DX_OUTPUT/index.html" ]; then
              echo "Found Dioxus output at $DX_OUTPUT, copying to dist/"
              mkdir -p dist
              cp -r "$DX_OUTPUT"/* dist/
            else
              echo "ERROR: index.html not found in expected locations"
              exit 1
            fi
          fi
          echo "dist/ contents:"
          ls -la dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
