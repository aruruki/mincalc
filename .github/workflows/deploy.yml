name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install dioxus-cli
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli@0.6.3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tailwind CSS
        run: npm install -D tailwindcss

      - name: Build Tailwind CSS
        run: npx @tailwindcss/cli -i ./input.css -o ./assets/tailwind.css

      - name: Build web app
        run: dx build --platform web --release

      - name: Debug build output
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== All files in current dir ==="
          ls -la
          echo "=== Checking dist/ ==="
          ls -la dist/ 2>/dev/null || echo "dist/ not found"
          echo "=== Checking target/ ==="
          ls -la target/ 2>/dev/null || echo "target/ not found"
          echo "=== Checking target/dx/ ==="
          ls -la target/dx/ 2>/dev/null || echo "target/dx/ not found"
          echo "=== Deep check for target/dx/ ==="
          find target/dx -type d 2>/dev/null | head -20 || echo "no target/dx/"
          echo "=== Searching for ALL HTML files ==="
          find . -name "*.html" -type f 2>/dev/null
          echo "=== Searching for any 'public' directories ==="
          find . -type d -name "public" 2>/dev/null
          echo "=== Dioxus.toml content ==="
          cat Dioxus.toml 2>/dev/null || echo "No Dioxus.toml found"

      - name: Prepare dist for upload
        run: |
          # Ensure dist/ exists and contains index.html
          if [ -f "dist/index.html" ]; then
            echo "Found dist/index.html"
          else
            echo "dist/index.html not found, searching for Dioxus output..."
            
            # Try various possible Dioxus output locations
            POSSIBLE_LOCATIONS=(
              "target/dx/mincalc/release/web"
              "target/dx/mincalc/release/web/public"
              "target/dx/release/web"
              "target/dx/release/web/public"
              "target/dx/mincalc/release/dist"
              "target/dx/release/dist"
              "target/dx/mincalc/release/public"
              "target/dx/release/public"
            )
            
            FOUND=""
            for loc in "${POSSIBLE_LOCATIONS[@]}"; do
              if [ -f "$loc/index.html" ]; then
                echo "Found Dioxus output at: $loc"
                FOUND="$loc"
                break
              fi
            done
            
            if [ -n "$FOUND" ]; then
              echo "Copying from $FOUND to dist/"
              mkdir -p dist
              cp -r "$FOUND"/* dist/
            else
              echo "ERROR: index.html not found in any expected location"
              echo "Listing all files in target/:"
              find target/ -type f -name "*.html" 2>/dev/null || echo "No HTML files found"
              exit 1
            fi
          fi
          echo "dist/ contents:"
          ls -la dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
